    <script>
        function tellFortune(job, location, name, numberofchildren) {
            return `You will be a ${job} in ${location}, and married to ${name} with ${numberofchildren} kids.`;
        }

        console.log(tellFortune("software engineer", "Jordan", "Alice", 3));

        }

        calculateDogAge(1);
    </script>
